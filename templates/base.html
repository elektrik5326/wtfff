<!DOCTYPE html>
<html>
<head>
    <title> {% block title %}{% endblock %}</title>
    <style>
        li {
            padding: 10px;
            border: solid 1px black;
            border-radius: 5px 0px;
            margin: 10px;
        }
        header {
            padding: 20px;
            background-color: darkgoldenrod;
            display: flex;
            justify-content: space-between
        }
        * {
            font-family: "Montserrat";
            margin: 0;
            padding: 0;
            background-color: whitesmoke;
        }
        .container {
            margin: 10px 15%;
            padding: 5px;
        }

        input {
            padding: 5px;
        }
        button {
            padding: 5px;
        }
        .container {
            text-align: center;
        }
        a {
            color: black;
            padding: 5px;
        }
        a:visited {
            color: black;
        }
        .not_background_a {
            background-color: white;
        }
        .link {
            background-color: darkgoldenrod;
        }
        .role p {
            background-color: darkgoldenrod;
            padding: 5px;
        }
        .empty {
            width: 100px; 
            background-color: darkgoldenrod;
        }
        .link a {
            background-color: darkgoldenrod;
        }
    </style>
</head>
<body>
    <header>
        <div class="role">
            <p style="color : block">Ваша роль: {{ role }}</p>
        </div>
        <div class="link">
            <a href="/" id="link">Главная</a>
            <a href="/login" id="link">Вход</a>
            <a href="/adminpanel" id="link">Админ-панель</a>
            <a href="/developerpanel" id="link">Панель владельца</a>
        </div>
        <div class="empty"></div>
    </header>
    <div class="container">
        {% block main %}
        {% endblock %}
    </div>
</body>
</html>
